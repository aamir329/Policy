<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DEV-CORE | System Architecture Monitor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; }
        .terminal { border: 1px solid #333; background: #000; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .stat-box { border: 1px solid #00ff41; padding: 15px; text-align: center; }
        .log-entry { font-size: 0.75rem; border-bottom: 1px solid #111; padding: 5px; color: #888; }
        .log-entry.warn { color: #ffae00; }
        .log-entry.info { color: #00ff41; }
        .tab-btn { background: #111; color: #00ff41; border: 1px solid #00ff41; padding: 10px; cursor: pointer; }
        .tab-btn.active { background: #00ff41; color: #000; }
    </style>
</head>
<body>

    <h1><i class="fas fa-microchip"></i> CHO_SYSTEM_CORE v2.0</h1>

    <div class="grid">
        <div class="stat-box"><h4>DATABSE NODES</h4><div id="nodeCount">0</div></div>
        <div class="stat-box"><h4>SYSTEM LOAD</h4><div>2.4%</div></div>
        <div class="stat-box"><h4>PENDING ACTIONS</h4><div id="pendingCount">0</div></div>
        <div class="stat-box"><h4>UPTIME</h4><div id="uptime">00:00:00</div></div>
    </div>

    <div class="terminal" style="margin-top: 20px;">
        <h3><i class="fas fa-list-ul"></i> Global System Activity (Live)</h3>
        <div id="systemLogs" style="height: 400px; overflow-y: auto;">
            <div class="log-entry info">System: Kernel successfully attached to Firebase Cloud...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = const firebaseConfig = {
    apiKey: "AIzaSyDyGAAiybGdSQZvsJnzK46fUtCMmcVwhP0",
  authDomain: "crescent-heights-oyo.firebaseapp.com",
  projectId: "crescent-heights-oyo",
  storageBucket: "crescent-heights-oyo.firebasestorage.app",
  messagingSenderId: "1067062273531",
  appId: "1:1067062273531:web:c90a74569e8fb2d18c175e",
  measurementId: "G-G4CXEX6J8G"
};
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Track All System Movements
        const collections = ['students', 'applications', 'transactions', 'news', 'teachers'];
        
        collections.forEach(colName => {
            onSnapshot(collection(db, colName), snap => {
                const logs = document.getElementById('systemLogs');
                snap.docChanges().forEach(change => {
                    const div = document.createElement('div');
                    div.className = `log-entry ${change.type === 'added' ? 'info' : 'warn'}`;
                    div.innerText = `[${new Date().toLocaleTimeString()}] COLLECTION_${colName.toUpperCase()}: Action ${change.type.toUpperCase()} on ID: ${change.doc.id}`;
                    logs.prepend(div);
                });
                
                if(colName === 'students') document.getElementById('nodeCount').innerText = snap.size;
            });
        });

        // Uptime Timer
        let s = 0;
        setInterval(() => {
            s++;
            let date = new Date(null);
            date.setSeconds(s);
            document.getElementById('uptime').innerText = date.toISOString().substr(11, 8);
        }, 1000);
    </script>
</body>
</html>
