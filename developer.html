<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DEV-CORE | Dual-Architecture Monitor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; }
        .terminal { border: 1px solid #333; background: #000; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .stat-box { border: 1px solid #00ff41; padding: 15px; text-align: center; background: #050505; }
        .stat-box h4 { margin: 0 0 10px 0; color: #888; font-size: 0.8rem; letter-spacing: 1px; }
        .stat-box class="counter" { font-size: 1.8rem; font-weight: bold; }
        .counter { font-size: 1.8rem; font-weight: bold; }
        .log-entry { font-size: 0.75rem; border-bottom: 1px solid #111; padding: 6px; color: #aaa; font-family: 'Courier New', monospace; }
        .log-entry.warn { color: #ffae00; }
        .log-entry.info { color: #00ff41; }
        .log-entry.policy { color: #d4af37; }
        
        .system-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .badge {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
            margin-right: 5px;
        }
        .badge.cho { background: #00ff41; color: #000; }
        .badge.pol { background: #d4af37; color: #000; }
    </style>
</head>
<body>

    <div class="system-header">
        <h1><i class="fas fa-microchip"></i> CHO & POLICY SYSTEM_CORE v2.5</h1>
        <div>SYSTEM STATUS: <span style="color: #00ff41; font-weight: bold;">ONLINE</span></div>
    </div>

    <div class="grid">
        <div class="stat-box">
            <h4>CHO STUDENTS</h4>
            <div id="choNodeCount" class="counter">0</div>
        </div>
        <div class="stat-box">
            <h4>POLICY BOOKINGS</h4>
            <div id="policyNodeCount" class="counter">0</div>
        </div>
        <div class="stat-box">
            <h4>SYSTEM LOAD</h4>
            <div class="counter">1.8%</div>
        </div>
        <div class="stat-box">
            <h4>MONITOR UPTIME</h4>
            <div id="uptime" class="counter">00:00:00</div>
        </div>
    </div>

    <div class="terminal" style="margin-top: 20px;">
        <h3><i class="fas fa-list-ul"></i> Global Infrastructure Activity (Live Feed)</h3>
        <div id="systemLogs" style="height: 450px; overflow-y: auto; display: flex; flex-direction: column;">
            <div class="log-entry info">[SYSTEM]: Initializing dual kernel link...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 1. CHO PORTAL DATABASE INITIALIZATION
        const choFirebaseConfig = {
            apiKey: "AIzaSyDyGAAiybGdSQZvsJnzK46fUtCMmcVwhP0",
            authDomain: "crescent-heights-oyo.firebaseapp.com",
            projectId: "crescent-heights-oyo",
            storageBucket: "crescent-heights-oyo.firebasestorage.app",
            messagingSenderId: "1067062273531",
            appId: "1:1067062273531:web:c90a74569e8fb2d18c175e",
            measurementId: "G-G4CXEX6J8G"
        };
        const choApp = initializeApp(choFirebaseConfig, "choPortalInstance");
        const choDb = getFirestore(choApp);

        // 2. NEW DEPLOYED POLICY EQUESTRIAN CONFIGURATION
        const policyFirebaseConfig = {
            apiKey: "AIzaSyCxz-uDyB4_TCP2r9meiT7qkPo2A7OAzAY",
            authDomain: "policy-5b18f.firebaseapp.com",
            projectId: "policy-5b18f",
            storageBucket: "policy-5b18f.firebasestorage.app",
            messagingSenderId: "545579502369",
            appId: "1:545579502369:web:ba2c90f3a9ad4c8c368c60",
            measurementId: "G-RXXM1FLFH0"
        };
        const policyApp = initializeApp(policyFirebaseConfig, "policyEquestrianInstance");
        const policyDb = getFirestore(policyApp);

        const logsContainer = document.getElementById('systemLogs');

        function appendLog(context, collectionName, actionType, docId) {
            const div = document.createElement('div');
            const timestamp = new Date().toLocaleTimeString();
            
            if (context === 'CHO') {
                div.className = `log-entry ${actionType === 'added' ? 'info' : 'warn'}`;
                div.innerHTML = `[${timestamp}] <span class="badge cho">CHO</span> COLLECTION_${collectionName.toUpperCase()}: ${actionType.toUpperCase()} | ID: ${docId}`;
            } else {
                div.className = `log-entry policy`;
                div.innerHTML = `[${timestamp}] <span class="badge pol">POLICY</span> COLLECTION_${collectionName.toUpperCase()}: ${actionType.toUpperCase()} | ID: ${docId}`;
            }
            logsContainer.insertBefore(div, logsContainer.firstChild);
        }

        // Listeners for Cho portal
        const choCollections = ['students', 'applications', 'transactions', 'news', 'teachers'];
        choCollections.forEach(colName => {
            onSnapshot(collection(choDb, colName), snap => {
                snap.docChanges().forEach(change => { appendLog('CHO', colName, change.type, change.doc.id); });
                if(colName === 'students') document.getElementById('choNodeCount').innerText = snap.size;
            });
        });

        // Listener for Policy bookings collection
        onSnapshot(collection(policyDb, 'bookings'), snap => {
            snap.docChanges().forEach(change => { appendLog('POLICY', 'bookings', change.type, change.doc.id); });
            document.getElementById('policyNodeCount').innerText = snap.size;
        });

        let runSeconds = 0;
        setInterval(() => {
            runSeconds++;
            let dateObj = new Date(null);
            dateObj.setSeconds(runSeconds);
            document.getElementById('uptime').innerText = dateObj.toISOString().substr(11, 8);
        }, 1000);
    </script>
</body>
</html>
